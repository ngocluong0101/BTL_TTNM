<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLA Store - Kết quả tìm kiếm</title>
    <link rel="stylesheet" href="../../assets/css/common.css" />
    <link rel="stylesheet" href="search-result.css" />
  </head>
  <body class="search-page" data-page="search">
    <div class="page-shell">
      <div data-common-header data-active-page="search"></div>

      <main class="page-main">
        <div class="container">

          <!-- Breadcrumb -->
          <nav class="breadcrumb">
            <a href="../home/cart.html">Trang chủ</a>
            <span class="breadcrumb__sep">›</span>
            <span id="breadcrumbKeyword">Tìm kiếm</span>
          </nav>

          <!-- Tiêu đề kết quả -->
          <div class="search-header">
            <h1 class="search-header__title">
              Kết quả tìm kiếm "<span id="searchKeywordDisplay"></span>"
            </h1>
            <p class="search-header__count">
              Hiển thị kết quả <span id="resultCount">0</span>
            </p>
          </div>

          <div class="search-layout">

            <!-- Sidebar filter -->
            <aside class="filter-sidebar">
              <div class="filter-group">
                <div class="filter-group__header" data-toggle="categoryFilter">
                  <span class="filter-group__label">Danh mục</span>
                  <span class="filter-group__arrow">▾</span>
                </div>
                <div class="filter-group__body" id="categoryFilter">
                  <label class="filter-option">
                    <input type="radio" name="category" value="" checked /> Tất cả
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="category" value="Giày chạy bộ" /> Giày chạy bộ
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="category" value="Giày chạy trail" /> Giày chạy trail
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="category" value="Giày running" /> Giày running
                  </label>
                </div>
              </div>

              <div class="filter-group">
                <div class="filter-group__header" data-toggle="priceFilter">
                  <span class="filter-group__label">Giá</span>
                  <span class="filter-group__arrow">▾</span>
                </div>
                <div class="filter-group__body" id="priceFilter">
                  <label class="filter-option">
                    <input type="radio" name="price" value="" checked /> Tất cả
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="price" value="0-1000000" /> Dưới 1.000.000đ
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="price" value="1000000-2000000" /> 1.000.000 – 2.000.000đ
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="price" value="2000000-4000000" /> 2.000.000 – 4.000.000đ
                  </label>
                  <label class="filter-option">
                    <input type="radio" name="price" value="4000000-99999999" /> Trên 4.000.000đ
                  </label>
                </div>
              </div>

              <button class="filter-reset" id="filterReset">Xóa bộ lọc</button>
            </aside>

            <!-- Khu vực kết quả -->
            <div class="search-results">

              <!-- Toolbar sort -->
              <div class="results-toolbar">
                <span class="results-toolbar__label">Sắp xếp:</span>
                <div class="sort-tabs" id="sortTabs">
                  <button class="sort-tab sort-tab--active" data-sort="default">Phù hợp nhất</button>
                  <button class="sort-tab" data-sort="price-asc">Giá tăng dần</button>
                  <button class="sort-tab" data-sort="price-desc">Giá giảm dần</button>
                  <button class="sort-tab" data-sort="name-asc">A → Z</button>
                </div>
              </div>

              <!-- Grid sản phẩm -->
              <div class="product-grid" id="productGrid"></div>

              <!-- Trạng thái rỗng -->
              <div class="empty-state" id="emptyState" hidden>
                <div class="empty-state__icon">🔍</div>
                <p class="empty-state__title">Không tìm thấy sản phẩm nào</p>
                <p class="empty-state__sub">Thử lại với từ khóa khác hoặc xóa bộ lọc.</p>
                <a class="btn btn--primary" href="../home/cart.html">Về trang chủ</a>
              </div>

            </div>
          </div>

        </div>
      </main>

      <div data-common-footer></div>
      <div id="modalRoot"></div>
    </div>

    <script src="../../assets/js/utils.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/products.js"></script>
    <script src="search-result.js"></script>
  </body>
</html>
